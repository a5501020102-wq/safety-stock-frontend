name: E2E Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout frontend
        uses: actions/checkout@v4

      - name: Checkout backend
        uses: actions/checkout@v4
        with:
          repository: a5501020102-wq/safety-stock-automation
          path: safety-stock-automation
          ref: main
          token: ${{ secrets.BACKEND_REPO_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip
          cache-dependency-path: safety-stock-automation/requirements.txt

      - name: Install frontend dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Install backend dependencies
        run: pip install -r safety-stock-automation/requirements.txt

      - name: Start backend
        run: |
          cd safety-stock-automation
          python -c "from app import app; app.run(host='0.0.0.0', port=5000, use_reloader=False)" &
          sleep 5
          curl -f http://localhost:5000/health || exit 1
        env:
          FLASK_ENV: testing

      - name: Build frontend
        run: npm run build

      - name: Start frontend
        run: |
          npm start &
          sleep 5
          curl -f http://localhost:3000 || exit 1
        env:
          NEXT_PUBLIC_API_URL: http://localhost:5000

      - name: Copy test data
        run: |
          mkdir -p data
          cp safety-stock-automation/data/material_master.json data/ || true

      - name: Run E2E tests
        run: npx playwright test
        env:
          E2E_BASE_URL: http://localhost:3000
          E2E_API_URL: http://localhost:5000

      - name: Upload test report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

      - name: Upload test screenshots
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: test-screenshots
          path: test-results/
          retention-days: 7
